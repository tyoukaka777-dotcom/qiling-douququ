<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张起灵 · 跨维度生死斗兽场</title>
    <style>
        body { background-color: #0d0000; color: #ff3333; font-family: 'Courier New', Courier, monospace; padding: 15px; margin: 0; }
        .container { max-width: 600px; margin: 20px auto; border: 1px solid #ff3333; padding: 20px; box-shadow: 0 0 20px rgba(255, 51, 51, 0.3); background-color: #1a0000; }
        h1 { font-size: 1.3rem; text-align: center; border-bottom: 2px solid #ff3333; padding-bottom: 10px; margin-bottom: 20px; text-shadow: 0 0 5px #ff0000; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #ffaaaa; }
        input { background: #000; color: #ff3333; border: 1px solid #ff3333; padding: 8px; width: 100%; box-sizing: border-box; outline: none; }
        input:focus { box-shadow: 0 0 8px rgba(255, 51, 51, 0.5); }
        button { background: #ff3333; color: #000; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; font-size: 1rem; }
        button:hover { background: #fff; color: #ff0000; box-shadow: 0 0 10px #ff3333; }
        #result { margin-top: 25px; line-height: 1.6; border-top: 1px dashed #ff3333; padding-top: 15px; font-size: 0.95rem; color: #ffcccc; }
        .sys-msg { color: #ff8888; font-style: italic; font-size: 0.8rem; }
        .error { color: #ff4444; padding: 10px; border: 1px solid #ff4444; margin-top: 10px; background: #330000; }
        .footer { text-align: center; font-size: 0.7rem; margin-top: 30px; opacity: 0.5; color: #ff3333; }
        #set-key-btn { background: none; color: #ff3333; border: 1px solid #ff3333; width: auto; font-size: 0.7rem; padding: 2px 5px; margin-bottom: 10px; float: right; }
    </style>
</head>
<body>

<div class="container">
    <button id="set-key-btn" onclick="askForKey()">🔑 权限验证</button>
    <h1>[ 张起灵跨维度生死斗兽场终端 ]</h1>
    
    <div class="input-group">
        <label>投放猎物/对手：</label>
        <input type="text" id="opponent" value="狂暴的异形女皇">
    </div>
    
    <div class="input-group">
        <label>封闭角斗环境：</label>
        <input type="text" id="location" value="八角铁笼与布满尖刺的深坑">
    </div>
    
    <button onclick="startFight()">▶ 开启不死不休决斗</button>

    <div id="result">斗兽场闸门已关闭，等待投放斗士...</div>
</div>

<div class="footer">WELCOME TO THE ARENA - NO ESCAPE, ONLY DEATH</div>

<script>
    let API_KEY = localStorage.getItem('deepseek_api_key');

    function askForKey() {
        const key = prompt("请输入斗兽场核心秘钥 (DeepSeek API Key):", API_KEY || "");
        if (key) {
            localStorage.setItem('deepseek_api_key', key);
            API_KEY = key;
            alert("秘钥注入成功！");
        }
    }

    async function startFight() {
        if (!API_KEY) {
            alert("请先点击右上角【权限验证】输入你的 DeepSeek API Key。");
            askForKey();
            return;
        }

        const opponent = document.getElementById('opponent').value;
        const location = document.getElementById('location').value;
        const resultDiv = document.getElementById('result');

        // 提示语换成更硬核的风格
        resultDiv.innerHTML = "<span class='sys-msg'>[系统] 斗兽场闸门已锁死，正在推演残酷的厮杀过程...</span>";

        try {
            // 【核心修改点 1】改变系统身份设定
            const systemPrompt = "你是一个存在于深渊深处的跨维度斗兽场（The Arena）的专属记录官。你的任务是冷酷、血腥、客观地记录被强行传送至此的斗士之间‘不死不休’的生死决斗。";
            
            // 【核心修改点 2】改变具体的推演指令
            const userPrompt = `请推演【张起灵】与【${opponent}】在封闭场地【${location}】内的生死决斗。
            要求：
            1. 斗兽场法则：双方被绝对力量强制封闭在场地内，无法撤退，无法逃跑。这必须是一场不死不休的硬核厮杀，直到一方彻底死亡或失去生命体征。
            2. 明确名字：必须在记录中明确写出“张起灵”和“${opponent}”的具体名字。
            3. 战斗过程：详细描写双方在绝境下的杀招碰撞。张起灵的黑金古刀如何切割、发力，麒麟血如何发挥作用。场面要惨烈、拳拳到肉、充满绝望感与破坏力。
            4. 宣判结局：结尾必须有一方惨死或被彻底摧毁。明确宣判谁是活下来的最终胜利者，并描写战败者的死状与现场的惨烈。绝对不可平局！
            5. 严禁出现HP、回合、暴击等任何游戏术语，保持极度写实感。
            6. 必须输出纯文本，尽量减少使用 Markdown 符号。`;

            const url = 'https://api.deepseek.com/chat/completions';
            
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat', 
                    messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: userPrompt }
                    ],
                    temperature: 0.8 // 稍微调高一点温度，让战斗画面的想象力更丰富、更惨烈
                })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || "服务器拒绝访问，请检查 Key 是否正确，或当前是否欠费。");
            }

            const data = await response.json();
            const text = data.choices[0].message.content;
            
            // 将星号转换为斗兽场风格的纯白色高亮文字
            const formattedText = text
                .replace(/\*\*(.*?)\*\*/g, "<span style='color: #ffffff; font-weight: bold; background-color: #330000; padding: 0 3px;'>$1</span>")
                .replace(/\n/g, "<br>");
            
            resultDiv.innerHTML = `<b>【生死决斗实况记录】</b><br><br>${formattedText}`;

        } catch (error) {
            resultDiv.innerHTML = `<div class='error'>🚨 闸门故障：${error.message}</div>`;
        }
    }
</script>

</body>
</html>
