<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张起灵 · 异常交战推演系统 (DeepSeek 驱动)</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff41; font-family: 'Courier New', Courier, monospace; padding: 15px; margin: 0; }
        .container { max-width: 600px; margin: 20px auto; border: 1px solid #00ff41; padding: 20px; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
        h1 { font-size: 1.2rem; text-align: center; border-bottom: 2px solid #00ff41; padding-bottom: 10px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; }
        input { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 8px; width: 100%; box-sizing: border-box; outline: none; }
        button { background: #00ff41; color: #000; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #fff; }
        #result { margin-top: 25px; line-height: 1.6; border-top: 1px dashed #00ff41; padding-top: 15px; font-size: 0.95rem; }
        .sys-msg { color: #88cc88; font-style: italic; font-size: 0.8rem; }
        .error { color: #ff4444; padding: 10px; border: 1px solid #ff4444; margin-top: 10px; }
        .footer { text-align: center; font-size: 0.7rem; margin-top: 30px; opacity: 0.5; }
        #set-key-btn { background: none; color: #00ff41; border: 1px solid #00ff41; width: auto; font-size: 0.7rem; padding: 2px 5px; margin-bottom: 10px; float: right; }
    </style>
</head>
<body>

<div class="container">
    <button id="set-key-btn" onclick="askForKey()">🔑 配置核心</button>
    <h1>[ 张起灵跨维度交战推演终端 ]</h1>
    
    <div class="input-group">
        <label>对手：</label>
        <input type="text" id="opponent" value="东北金渐层">
    </div>
    
    <div class="input-group">
        <label>场地：</label>
        <input type="text" id="location" value="长白山原始森林">
    </div>
    
    <button onclick="startFight()">▶ 执行推演程序</button>

    <div id="result">终端就绪，等待输入...</div>
</div>

<div class="footer">POWERED BY DEEPSEEK - CONFIDENTIAL BUREAU</div>

<script>
    // 检查是否有存储的 DeepSeek Key
    let API_KEY = localStorage.getItem('deepseek_api_key');

    function askForKey() {
        const key = prompt("请输入你的 DeepSeek API Key (仅保存在你本地浏览器):", API_KEY || "");
        if (key) {
            localStorage.setItem('deepseek_api_key', key);
            API_KEY = key;
            alert("DeepSeek Key 配置成功！");
        }
    }

    async function startFight() {
        if (!API_KEY) {
            alert("请先点击右上角【配置核心】输入你的 DeepSeek API Key。");
            askForKey();
            return;
        }

        const opponent = document.getElementById('opponent').value;
        const location = document.getElementById('location').value;
        const resultDiv = document.getElementById('result');

        resultDiv.innerHTML = "<span class='sys-msg'>[系统] 正在连接 DeepSeek 主脑，生成高保真推演档案中...</span>";

        try {
            // DeepSeek 的系统身份设定
            const systemPrompt = "你是一个机密异常事件调查局的资深档案记录员。";
            
            // 发给 DeepSeek 的具体指令
            const userPrompt = `请基于客观物理事实与角色能力设定，推演【张起灵】与【${opponent}】在场地【${location}】的战斗。
            要求：
            1. 必须是一份伪纪实悬疑档案风格的调查报告。
            2. 必须在报告中明确写出“张起灵”和“${opponent}”的具体名字，禁止通篇使用“该目标”、“异常生物”等代词。
            3. 详细描写双方动作、兵器（如黑金古刀）与特性的碰撞画面。
            4. 结局必须清晰（胜/败/撤退/无伤脱身），不可模棱两可。
            5. 严禁出现HP、回合、暴击等任何游戏术语。`;

            // DeepSeek 官方 API 接口
            const url = 'https://api.deepseek.com/chat/completions';
            
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    // DeepSeek 的身份验证方式：Bearer Token
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat', // 使用 DeepSeek V3 核心模型
                    messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: userPrompt }
                    ],
                    temperature: 0.7 // 控制一点想象力，不要太脱缰
                })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || "服务器拒绝访问，请检查 Key 是否正确，或当前是否欠费。");
            }

            const data = await response.json();
            // 解析 DeepSeek 返回的数据格式
            const text = data.choices[0].message.content;
            
            // 渲染到页面上
            resultDiv.innerHTML = `<b>【异常交战观察报告】</b><br><br>${text.replace(/\n/g, "<br>")}`;

        } catch (error) {
            resultDiv.innerHTML = `<div class='error'>🚨 DeepSeek 接入失败：${error.message}</div>`;
        }
    }
</script>

</body>
</html>
